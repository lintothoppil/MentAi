{% extends "base.html" %}

{% block content %}
<h2>Reset Password</h2>
<form method="POST" action="{{ url_for('reset_password') }}" style="max-width: 500px; margin: 0 auto;">
    <table>
        <tr>
            <th>New Password</th>
            <td><input type="password" name="new_password" required></td>
        </tr>
    </table>
    <input type="submit" value="Update Password">
</form>
{% endblock %}
