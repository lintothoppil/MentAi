{% extends "base.html" %}

{% block content %}
<h2>Forgot Password</h2>
<p style="text-align: center;">Enter your registered Gmail address to receive an OTP.</p>
<form method="POST" action="{{ url_for('forgot_password') }}" style="max-width: 500px; margin: 0 auto;">
    <table>
        <tr>
            <th>Email Address</th>
            <td><input type="email" name="email" required></td>
        </tr>
    </table>
    <input type="submit" value="Send OTP">
</form>
{% endblock %}
